<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <rect width="200" height="200" fill="#0d0d0d"/>
  
  <!-- V letter - elegant, minimal -->
  <path d="M40 160 L100 40 L160 160" 
        fill="none" 
        stroke="#e6e6e6" 
        stroke-width="8" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  
  <!-- Pen/quill - subtle -->
  <path d="M130 130 L155 165 L145 170 L125 140" 
        fill="none" 
        stroke="#666" 
        stroke-width="3"
        stroke-linecap="round"/>
  
  <path d="M125 140 L115 155" 
        fill="none" 
        stroke="#666" 
        stroke-width="3"
        stroke-linecap="round"/>
</svg>
